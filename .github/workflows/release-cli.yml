name: Release CLI

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            asset: swiftbip39-macos-arm64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: swift build -c release
      - run: |
          mkdir -p dist
          cp .build/release/swiftbip39 dist/swiftbip39
          cp -R .build/release/SwiftBIP39_SwiftBIP39.bundle dist/SwiftBIP39_SwiftBIP39.bundle
          tar -C dist -czf "${{ matrix.asset }}" swiftbip39 SwiftBIP39_SwiftBIP39.bundle
          shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          find artifacts -name "*.tar.gz" -exec cp {} . \;
          find artifacts -name "*.sha256" -exec cat {} \; > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            swiftbip39-*.tar.gz
            checksums.txt
