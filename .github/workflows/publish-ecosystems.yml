name: Publish Ecosystems

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - name: Publish npm
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi
          npm publish --access public || {
            echo "npm publish failed. Check NPM_TOKEN permissions and package-name access."
            exit 0
          }

  pypi:
    runs-on: ubuntu-latest
    env:
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: PYTHONPATH=python python -m unittest discover python/tests
      - run: python -m pip install build twine
      - run: python -m build
      - name: Publish PyPI
        run: |
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."
            exit 0
          fi
          python -m twine upload dist/* || {
            echo "PyPI publish failed. Check PYPI_API_TOKEN permissions and package-name access."
            exit 0
          }
        env:
          TWINE_USERNAME: __token__

  crates:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - name: Publish crates.io
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
            exit 0
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN" || {
            echo "crates.io publish failed. Check CARGO_REGISTRY_TOKEN permissions and package-name access."
            exit 0
          }
